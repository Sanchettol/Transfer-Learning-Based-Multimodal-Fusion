<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emergency Detection System</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1f1c2c, #928dab);
            color: white;
        }

        .card {
            border-radius: 15px;
        }

        .btn-custom {
            background-color: #ff4b2b;
            border: none;
        }

        .btn-custom:hover {
            background-color: #ff416c;
        }

        .result-box {
            font-size: 1.5rem;
            font-weight: bold;
        }

        img {
            border-radius: 10px;
            margin-top: 15px;
            max-width: 100%;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow-lg bg-dark text-white">

        <h2 class="text-center mb-4">🚨 Emergency Detection System</h2>

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label">Upload Image</label>
                <input type="file" name="image" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Enter Message</label>
                <input type="text" name="text" class="form-control" placeholder="e.g. accident happened" required>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-custom px-4 py-2">Predict</button>
            </div>

        </form>

        {% if result %}
        <div class="text-center mt-4">
            <div class="alert alert-info result-box">
                {{ result }}
            </div>
        </div>
        {% endif %}

        {% if image_path %}
        <div class="text-center">
            <img src="{{ image_path }}" alt="Uploaded Image">
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
